hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      env.scenario: choice(passage)
      env.max_steps: choice(500)
      eval.max_steps: choice(500)
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra/sweeper=vmas_passage
    - hydra.mode=MULTIRUN
    task: []
  job:
    name: vmas_ppo
    chdir: null
    override_dirname: ''
    id: ???
    num: ???
    config_name: vmas_ppo
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /Users/xmaster/Work/xdrl
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /Users/xmaster/Work/xdrl/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: vmas_passage
      hydra/launcher: basic
      hydra/output: default
  verbose: false
algo: ippo
seed: 0
env:
  scenario: balance
  continuous_actions: true
  num_envs: 60
  max_steps: 100
  device: cpu
  scenario_kwargs:
    n_agents: 3
collector:
  frames_per_batch: 6000
  total_frames: 1200000
  no_cuda_sync: false
model:
  group: agents
  hidden_dim: 256
  depth: 2
  share_policy_params: true
  share_critic_params: true
loss:
  clip_epsilon: 0.2
  entropy_coef: 0.001
  gamma: 0.99
  lmbda: 0.95
optim:
  lr: 0.0003
  clip_grad_norm: true
  max_grad_norm: 1.0
train:
  device: cpu
  storing_device: cpu
  frame_skip: 1
  num_epochs: 10
  minibatch_size: 400
  optim_steps_per_batch: 15
  progress_bar: true
  save_trainer_interval: 10000
  log_interval: 10000
  policy_checkpoint_interval: 0
  policy_checkpoint_dir: checkpoints/policy
  policy_checkpoint_prefix: policy
eval:
  enabled: true
  pre_eval: true
  interval_frames: 12000
  episodes: 4
  max_steps: 100
  deterministic: true
  render: true
  video_fps: 20
logger:
  backend: wandb
  log_dir: logs
  experiment_name: vmas_ppo
  wandb_project: xdrl
