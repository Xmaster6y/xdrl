seed: 0

env:
  id: CartPole-v1
  num_envs: 1
  max_steps: 500
  device: cpu

collector:
  frames_per_batch: 200
  total_frames: 1000000
  no_cuda_sync: false

model:
  hidden_dim: 256
  depth: 2

buffer:
  memory_size: 50000
  init_random_frames: 1000

loss:
  gamma: 0.99
  loss_function: l2
  delay_value: true
  double_dqn: false
  soft_target_update: false
  tau: 0.005
  hard_target_update_interval: 250

exploration:
  eps_init: 1.0
  eps_end: 0.05
  anneal_frames: 25000

optim:
  lr: 0.0003
  clip_grad_norm: true
  max_grad_norm: 10.0

train:
  device: cpu
  storing_device: cpu
  frame_skip: 1
  minibatch_size: 256
  optim_steps_per_batch: 128
  progress_bar: true
  save_trainer_interval: null

eval:
  enabled: true
  pre_eval: true
  interval_frames: 5000
  episodes: 16
  max_steps: 500
  deterministic: true
  non_deterministic: true
  render: true
  video_fps: 20

logger:
  backend: wandb
  log_dir: logs
  experiment_name: gymnasium_dqn
  log_hparams: true
  metric_group: agent
  log_interval: 1000
  wandb_kwargs:
    project: xdrl
